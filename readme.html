<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>右鍵選單工具說明書</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; margin: 40px; color: #333; }
        h1 { border-bottom: 2px solid #33f; padding-bottom: 10px; color: #111; }
        code { background-color: #f4f4f4; padding: 2px 5px; border-radius: 3px; font-family: Consolas, monospace; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>
    <h1>Windows 右鍵選單工具 (複製路徑 + CMD/PowerShell 啟動器)</h1>
    <p>這是一個使用 Rust 語言實作的極簡、免安裝、免管理員權限的 Windows 右鍵選單工具。</p>
    <h2>使用方式</h2>
    <ul>
        <li>雙擊執行 <code>build\CopyPathTool.exe</code> 啟動設定精靈。</li>
        <li>勾選想要開啟的功能（複製檔案路徑、在此處開啟 CMD、在此處開啟 PowerShell），點選「套用設定」。</li>
        <li>欲卸載時，將所有功能取消勾選，並點選「套用設定」即可。</li>
    </ul>
</body>
</html>
